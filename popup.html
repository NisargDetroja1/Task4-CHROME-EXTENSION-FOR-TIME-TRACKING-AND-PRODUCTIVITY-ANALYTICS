<!DOCTYPE html>
<html>

<head>

    <title>Productivity Tracker</title>

    <link rel="stylesheet" href="popup.css">

</head>

<body>

    <div class="container">

        <h1>
            Productivity Tracker
        </h1>

        <div class="analytics">

            <div class="circle">

                <span id="score">
                    0%
                </span>

            </div>

            <h2>
                Productivity Score
            </h2>

        </div>

        <div class="stats">

            <div class="card">

                <h3>Total Time</h3>

                <p id="totalTime">
                    0 sec
                </p>

            </div>

            <div class="card">

                <h3>Sites Visited</h3>

                <p id="siteCount">
                    0
                </p>

            </div>

        </div>

        <h2 class="title">
            Website Analytics
        </h2>

        <div id="websiteList"></div>

    </div>

    <script src="popup.js"></script>

</body>

</html>
